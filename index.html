function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function tryDecrypt(){
  const pw=document.getElementById('pw').value;
  if(!pw)return;
  try{
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveBits','deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(S),iterations:100000,hash:'SHA-256'},km,{name:'AES-CBC',length:256},false,['decrypt']);
    const dec=await crypto.subtle.decrypt({name:'AES-CBC',iv:b64(I)},key,b64(C));
    const html=new TextDecoder().decode(dec);
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById('err').style.display='block';
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}
document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')tryDecrypt()});
